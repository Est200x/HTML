<!--
  hellstar-login.html

  ปรับดีไซน์ให้ดูเหมือนแบรนด์สตรีทแวร์จริง ๆ (โทนดำ-แดง, ฟอนต์ตัวหนา
  แบบ condensed, กรอบเส้นบาง, glow แดงเรือง ๆ) แทนฟอร์ม login ทั่วไป

  สิ่งที่เพิ่ม/แก้จากเวอร์ชันก่อนหน้า:
  - โหลดฟอนต์ Bebas Neue (หัวข้อ) และ Inter (เนื้อหา) จาก Google Fonts
  - เพิ่ม <label> จริงที่ผูกกับ input ด้วย for/id (จากเดิมที่ใช้แค่
    aria-label ซึ่งใช้งานได้แต่ label ที่มองเห็นได้จะช่วยผู้ใช้ทุกคนกว่า)
  - เพิ่มข้อความ eyebrow "MEMBERS ONLY" และ tagline สั้น ๆ ให้หน้ามี
    บุคลิกแบรนด์ ไม่ใช่แค่ฟอร์มเปล่า ๆ
  - เพิ่มก้อนแสง ambient-glow (ตกแต่งล้วน ๆ) พร้อม aria-hidden="true"
  - ครอบลิงก์ "Create account" / "Forgot Password?" ด้วย <div class="links">
    เพื่อจัดวางเป็นแถวเดียวกันอย่างเป็นระบบ
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLSTAR — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="red-glow-hero.css">
</head>
<body>
    <div class="ambient-glow ambient-glow--top" aria-hidden="true"></div>
    <div class="ambient-glow ambient-glow--bottom" aria-hidden="true"></div>

    <div class="glow-panel">
        <span class="eyebrow">Members Only</span>
        <h1>HELLSTAR</h1>
        <p class="tagline">Sign in to access your account.</p>

        <form action="#" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="button"></button>

            <div class="links">
                <a href="#">Create account</a>
                <a href="#">Forgot password?</a>
            </div>
        </form>
    </div>
</body>
</html>
